name: Purge Hostinger CDN cache

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Hostinger auto-deploy to finish
        run: sleep 120

      - name: Purge CDN cache
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          curl -sS -X DELETE \
            "https://developers.hostinger.com/api/hosting/v1/accounts/u310256306/websites/app.kings-international.net/cache/clear" \
            -H "Authorization: Bearer ${HOSTINGER_API_TOKEN}" \
            -H "Accept: application/json" \
            --fail
