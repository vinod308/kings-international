backend:
  name: github
  repo: vinod308/kings-international
  branch: main
  base_url: https://app.kings-international.net
  auth_endpoint: api/auth

logo_url: "https://app.kings-international.net/images/kings/logo/kings-international-logo.png"
site_url: "https://app.kings-international.net"
display_url: "https://app.kings-international.net"

publish_mode: simple

media_folder: "public/images/kings/uploads"
public_folder: "/images/kings/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "content/settings/home.json"
        label: "Homepage"
        name: "home"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image" }
          - { label: "Hero Image Alt Text", name: "heroAlt", widget: "string" }

      - file: "content/settings/about.json"
        label: "About Page"
        name: "about"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Our Story Section"
            name: "story"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "target", widget: "number" }
                  - { label: "Suffix", name: "suffix", widget: "string", required: false }
                  - { label: "Label", name: "label", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list" }
              - { label: "Quote", name: "quote", widget: "text" }
          - label: "Journey Section"
            name: "journey"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Timeline Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Year", name: "year", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Beliefs Section"
            name: "beliefs"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Belief Items", name: "items", widget: "list" }
          - label: "Craftsmanship Section"
            name: "craftsmanship"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }
          - label: "Houses Section"
            name: "houses"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/manufacturing.json"
        label: "Smart Factory Page"
        name: "manufacturing"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "The Floor Section"
            name: "floorSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Floor Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Number", name: "num", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Brands Section"
            name: "brandsSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/markets.json"
        label: "By Industry Page"
        name: "markets"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Markets"
            name: "markets"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string", hint: "Lucide icon name, e.g. Shirt, Medal, Car, HardHat, Dog, Crosshair" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/oem.json"
        label: "OEM Services Page"
        name: "oem"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Models Section"
            name: "modelsSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon", name: "icon", widget: "string", hint: "Lucide icon name, e.g. Tag, Wrench, Package, ShieldCheck" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Why It Works Section"
            name: "whySection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/quality.json"
        label: "Quality Assurance Page"
        name: "quality"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Stages Section"
            name: "stagesSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Stages"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon", name: "icon", widget: "string", hint: "Lucide icon name, e.g. Search, Ruler, ClipboardCheck, PackageCheck" }
                  - { label: "Number", name: "num", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Why It Matters Section"
            name: "whySection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/sustainability.json"
        label: "Sustainability Page"
        name: "sustainability"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Initiatives Section"
            name: "initiativesSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Initiatives"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon", name: "icon", widget: "string", hint: "Lucide icon name, e.g. Droplets, Wind, Recycle, FlaskConical" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Note (optional)", name: "note", widget: "string", required: false }
                  - { label: "Body", name: "body", widget: "text" }
          - label: "Commitments Section"
            name: "commitmentsSection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Commitments", name: "items", widget: "list" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/media.json"
        label: "Media & Gallery Page"
        name: "media"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "Gallery Section"
            name: "gallerySection"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonHref", widget: "string" }

      - file: "content/settings/contact.json"
        label: "Contact Page"
        name: "contact"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Intro", name: "intro", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
          - { label: "Recipient Email", name: "recipientEmail", widget: "string" }
          - label: "Offices"
            name: "offices"
            widget: "object"
            fields:
              - label: "India Office"
                name: "india"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Address", name: "address", widget: "text" }
                  - { label: "Phone Numbers", name: "phones", widget: "list" }
                  - { label: "Emails", name: "emails", widget: "list" }
                  - { label: "Hours", name: "hours", widget: "string" }
              - label: "UK Office"
                name: "uk"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Address", name: "address", widget: "text" }
                  - { label: "Phone Numbers", name: "phones", widget: "list" }
                  - { label: "Emails", name: "emails", widget: "list" }
                  - { label: "Hours", name: "hours", widget: "string" }
          - label: "Quick Links"
            name: "quickLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string", hint: "Lucide icon name, e.g. MessageCircle, Sparkles, Newspaper, Wrench" }
          - label: "Steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - { label: "Interest Dropdown Options", name: "interests", widget: "list" }

  - name: "media"
    label: "Media Gallery"
    folder: "content/media"
    create: true
    slug: "{{order}}-{{fields.category}}"
    fields:
      - { label: "Order", name: "order", widget: "number" }
      - { label: "Image", name: "src", widget: "image" }
      - { label: "Alt Text", name: "alt", widget: "string" }
      - { label: "Caption", name: "caption", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["facility", "products"]

  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Number", name: "num", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "Blurb", name: "blurb", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Hero Intro", name: "heroIntro", widget: "text" }
      - { label: "Characteristics", name: "characteristics", widget: "list" }
      - { label: "Applications", name: "applications", widget: "list" }
      - label: "Specs"
        name: "specs"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }

  - name: "brands"
    label: "Brands"
    folder: "content/brands"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Number", name: "num", widget: "string" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Tag", name: "tag", widget: "string" }
      - { label: "Copy", name: "copy", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "list" }
      - { label: "Materials", name: "materials", widget: "list" }
      - { label: "Quote", name: "quote", widget: "text" }

  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Content"
        name: "content"
        widget: "text"
        hint: "Use ## for headings, **text** for bold, - for bullet lists, 1. for numbered lists. Separate paragraphs with a blank line."

  - name: "certifications_page"
    label: "Certifications Page"
    files:
      - file: "content/certifications.json"
        label: "Certifications"
        name: "certifications"
        fields:
          - label: "Certifications"
            name: "certifications"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Why Certified"
            name: "whyCertified"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Certification Badges"
            name: "certificationBadges"
            widget: "list"
          - label: "Certification Slides"
            name: "certificationSlides"
            widget: "list"
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
